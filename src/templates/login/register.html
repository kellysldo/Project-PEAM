<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEAMS | Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container-fluid p-0 vh-100 overflow-hidden">
        <div class="row g-0 h-100">
            
            <div class="col-md-5 bg-dark-section d-flex align-items-center justify-content-center p-5">
                <div class="w-100" style="max-width: 380px;">
                    <h1 class="text-white fw-bold mb-1">Create Account</h1>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="full_name" class="form-label-custom">Full Name</label>
                            <input type="text" id="full_name" name="full_name" class="form-underline" placeholder="Enter full name" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label-custom">Email</label>
                            <input type="email" id="email" name="email" class="form-underline" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label-custom">Username</label>
                            <input type="text" id="username" name="username" class="form-underline" placeholder="Enter username" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label-custom">Password</label>
                            <input type="password" id="password" name="password" class="form-underline" placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn btn-purple-pill w-100 mb-3 shadow">Register</button>
                    </form>

                    <p class="text-center text-secondary small">
                        Already have an account? <a href="/login" class="text-purple-link">Login here</a>
                    </p>
                </div>
            </div>

            <div class="col-md-7 bg-purple-section d-none d-md-flex flex-column justify-content-between p-5 text-white">
                <div class="mt-5 ps-5 welcome-text-container">
                    <h2>Welcome</h2>
                    <h3 class="fw-light small mb-0 ms-1 opacity-75">to</h3>
                    <h1>PEAMS</h1>
                    <p class="lead opacity-75">Events Attendance Management System</p>
                </div>

                <div class="illustration-box shadow-lg">
                    <img src="{{ url_for('static', filename='images/peams_illustration.png') }}" 
                         alt="Team Illustration" 
                         class="img-fluid">
                </div>
            </div>

        </div>
    </div>

</body>
</html>
