<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEAMS | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container-fluid p-0 vh-100 overflow-hidden">
        <div class="row g-0 h-100">
            
            <div class="col-md-5 bg-dark d-flex align-items-center justify-content-center p-5">
                <div class="w-100" style="max-width: 380px;">
                    <h1 class="text-white fw-bold mb-1">Login</h1>
                    <p class="text-secondary small mb-4">Enter your account details</p>

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-warning py-2 small">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-4">
                            <label class="text-secondary small mb-1">Username</label>
                            <input type="text" name="username" class="form-underline" placeholder="Enter username" required>
                        </div>

                        <div class="mb-4">
                            <label class="text-secondary small mb-1">Password</label>
                            <input type="password" name="password" class="form-underline" placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn btn-purple-pill w-100 mb-3">Login</button>
                    </form>

                    <p class="text-center text-secondary small">
                        No account? <a href="/register" class="text-purple-link">Register here</a>
                    </p>
                </div>
            </div>

            <div class="col-md-7 bg-purple d-none d-md-flex flex-column justify-content-between p-5 text-white">
                <div class="mt-5 ps-5">
                    <h2 class="display-3 fw-light mb-0">Welcome</h2>
                    <h3 class="fw-light small mb-0 ms-1">to</h3>
                    <h1 class="display-1 fw-bold">PEAMS</h1>
                </div>

                <div class="illustration-box align-self-end mt-auto">
                    <img src="{{ url_for('static', filename='images/peams_illustration.png') }}" 
                         alt="Team Illustration" 
                         class="img-fluid rounded-start-5 shadow-lg bg-white p-3">
                </div>
            </div>

        </div>
    </div>

</body>
</html>
