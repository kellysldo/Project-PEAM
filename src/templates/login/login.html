<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEAMS | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container-fluid p-0 vh-100 overflow-hidden">
        <div class="row g-0 h-100">
            
            <div class="col-md-5 bg-dark-section d-flex align-items-center justify-content-center p-5">
                <div class="w-100" style="max-width: 380px;">
                    <h1 class="text-white fw-bold mb-1">Login</h1>
                    <p class="text-secondary small mb-4">Enter your account details</p>

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-warning py-2 small border-0 shadow-sm">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-4">
                            <span class="form-label-custom">Username</span>
                            <input type="text" name="username" class="form-underline" placeholder="e.g. admin_user" required>
                        </div>

                        <div class="mb-4">
                            <span class="form-label-custom">Password</span>
                            <input type="password" name="password" class="form-underline" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-purple-pill w-100 mb-3 shadow">Login</button>
                    </form>

                    <p class="text-center text-secondary small">
                        Don't have an account? <a href="/register" class="text-purple-link">Sign up</a>
                    </p>
                </div>
            </div>

            <div class="col-md-7 bg-purple-section d-none d-md-flex flex-column justify-content-between p-5 text-white">
                <div class="mt-5 ps-5 welcome-text-container">
                    <h2>Welcome</h2>
                    <h3 class="fw-light small mb-0 ms-1 opacity-75">to</h3>
                    <h1>PEAMS</h1>
                    <p class="lead opacity-75">Events Attendance Management System</p>
                </div>

                <div class="illustration-box shadow-lg">
                    <img src="{{ url_for('static', filename='images/peams_illustration.png') }}" 
                         alt="Team Illustration" 
                         class="img-fluid">
                </div>
            </div>

        </div>
    </div>

</body>
</html>
