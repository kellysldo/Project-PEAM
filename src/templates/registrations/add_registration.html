<!DOCTYPE html>
<html>
<head>
    <title>Add Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Add Registration</h2>

    <!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert 
                {% if category == 'error' %}alert-danger{% else %}alert-success{% endif %} 
                alert-dismissible fade show" role="alert">

                {{ message }}

                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

    <div class="card p-4 shadow-sm">

        <form method="POST">

            <!-- ATTENDEE -->
            <div class="mb-3">
                <label class="form-label">Attendee</label>
                <select name="attendee_id" class="form-select" required>
                    <option value="">-- Select Attendee --</option>
                    {% for a in attendees %}
                        <option value="{{ a.attendee_id }}">
                            {{ a.fullname }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- EVENT -->
            <div class="mb-3">
                <label class="form-label">Event</label>
                <select name="event_id" class="form-select" required>
                    <option value="">-- Select Event --</option>
                    {% for e in events %}
                        <option value="{{ e.event_id }}">
                            {{ e.event_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- STATUS -->
            <div class="mb-3">
                <label class="form-label">Attendance Status</label>
                <select name="attendance_status" class="form-select" required>
                    <option value="registered">Registered</option>
                    <option value="present">Present</option>
                    <option value="absent">Absent</option>
                </select>
            </div>

            <!-- BUTTONS -->
            <button type="submit" class="btn btn-primary">
                Save Registration
            </button>

            <a href="/registrations" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>
</div>

<!-- Bootstrap JS (needed for alerts close button) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
